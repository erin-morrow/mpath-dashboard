<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M-PATH Study Dashboard</title>
<style>
body{font-family:Arial;background:white;max-width:1400px;margin:auto;padding:40px;}
h1{margin-bottom:30px;text-align:center;font-weight:600;}
.card{background:#f5f7fb;padding:20px;margin-bottom:18px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.bar-bg{width:100%;background:#eee;border-radius:8px;overflow:hidden;margin-top:8px;}
.bar{height:28px;color:white;text-align:center;line-height:28px;transition:width 0.5s ease;}
button{padding:8px 14px;margin-top:10px;margin-right:6px;border:none;border-radius:6px;cursor:pointer;background:#4CAF50;color:white;}
.delete{background:#e74c3c;}
input{padding:6px;margin-right:6px;}
.editor{margin-top:10px;}
#dashboard{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;justify-content:flex-start;}
.card.small{width:180px;flex-shrink:0;}
.card.large{flex:1;}
</style>
</head>
<body>

<h1>M-PATH Study Dashboard</h1>
<img src="M-PATH-logo.png" alt="Study Logo" style="display:block;margin:20px auto;max-width:300px;">
<div id="dashboard"></div>

<h3>Add Task</h3>
<input id="newName" placeholder="Task name">
<input id="newCount" type="number" placeholder="Count" min="0">
<input id="newTotal" type="number" placeholder="Total" min="1">
<input id="newColor" type="color" value="#4CAF50">
<button onclick="addTask()">Add</button>

<script>
// Default tasks
let tasks=[
  {name:"Sessions completed", count:43, color:"#0076b3ff"},
  {name:"Scan issues", countData:{squeeze:3, late:2, metal:1, other:2}, color:"#e69138ff"},
  {name:"Participants with motion concerns", countData:{fd:12, outliers:7}, color:"#4caf50ff"},
  {name:"Complete sessions", count:30, total:60, color:"#f39c12ff"},
  {name:"fMRIPrep run", count:0, color:"#0076b3ff", people:[{name:"Alex",count:12},{name:"Sam",count:9}]},
  {name:"Preprocessing with at least 2 QCs completed", count:0, color:"#e69138ff", people:[{name:"Alex",count:12},{name:"Sam",count:9}]},
  {name:"BET completed", count:0, color:"#0076b3ff", people:[{name:"Alex",count:12},{name:"Sam",count:9}]},
  {name:"Neuromelanin with at least 2 raters completed", count:0, color:"#e69138ff", people:[{name:"Alex",count:12},{name:"Sam",count:9}]},
  {name:"Free recall transcript processing completed", count:0, color:"#0076b3ff", people:[{name:"Alex",count:12},{name:"Sam",count:9}]}
];

function draw(){
  let html="";
  tasks.forEach((t,i)=>{
    if(i<4){ // Top row small cards
      if(t.name==="Sessions completed" || t.name==="Complete sessions"){
        html += `<div class="card small"><b>${t.name}</b>
          <div style="font-size:24px;font-weight:bold;margin-top:8px;color:${t.color}">
            ${t.count||0}${t.total?` / ${t.total}`:""}
          </div>
          <div class="editor">Count: <input type="number" min="0" value="${t.count||0}" id="count${i}">
          ${t.total?`Total: <input type="number" min="1" value="${t.total}" id="total${i}">`:""}
          <button onclick="update(${i})">Update</button></div></div>`;
      } else if(t.name==="Scan issues"){
        let c=t.countData||{};
        html += `<div class="card small"><b>${t.name}</b>
          <div class="editor">
            Squeeze ball: <input type="number" min="0" value="${c.squeeze||0}" id="squeeze${i}"><button onclick="updateScan(${i})">Update</button><br>
            Late: <input type="number" min="0" value="${c.late||0}" id="late${i}"><button onclick="updateScan(${i})">Update</button><br>
            Metal: <input type="number" min="0" value="${c.metal||0}" id="metal${i}"><button onclick="updateScan(${i})">Update</button><br>
            Other: <input type="number" min="0" value="${c.other||0}" id="other${i}"><button onclick="updateScan(${i})">Update</button>
          </div></div>`;
      } else if(t.name==="Participants with motion concerns"){
        let c=t.countData||{};
        html += `<div class="card small"><b>${t.name}</b>
          <div class="editor">
            FD>0.5: <input type="number" min="0" value="${c.fd||0}" id="fd${i}"><button onclick="updateMotion(${i})">Update</button><br>
            Outliers>2SD: <input type="number" min="0" value="${c.outliers||0}" id="outliers${i}"><button onclick="updateMotion(${i})">Update</button>
          </div></div>`;
      }
    } else { // Large cards
      html += `<div class="card large"><b>${t.name}</b>
        <div class="editor">Count: <input type="number" min="0" value="${t.count||0}" id="count${i}">
        <button onclick="update(${i})">Update</button></div>`;
      if(t.total!==undefined){
        html += `<div class="bar-bg"><div class="bar" style="width:${(t.count/t.total)*100}%; background:${t.color}">${t.count} / ${t.total}</div></div>`;
      }
      if(t.people){
        html += `<div class="editor">People:<br>`;
        t.people.forEach((p,pi)=>{
          html += `${p.name} <input type="number" min="0" value="${p.count}" id="person${i}_${pi}"><button onclick="updatePerson(${i},${pi})">Update</button>
          <button class="delete" onclick="removePerson(${i},${pi})">Delete</button><br>`;
        });
        html += `Add: <input id="newPersonName${i}" placeholder="Name"> <input id="newPersonCount${i}" type="number" min="0" placeholder="Count"> <button onclick="addPerson(${i})">Add</button></div>`;
      }
      html += `</div>`;
    }
  });
  document.getElementById("dashboard").innerHTML = html;
}

// Update functions
function update(i){ tasks[i].count=parseInt(document.getElementById("count"+i).value)||0; if(tasks[i].total!==undefined){ tasks[i].total=parseInt(document.getElementById("total"+i).value)||1;} draw(); }
function updateMotion(i){ let c=tasks[i].countData||{}; c.fd=parseInt(document.getElementById("fd"+i).value)||0; c.outliers=parseInt(document.getElementById("outliers"+i).value)||0; tasks[i].countData=c; draw();}
function updateScan(i){ let c=tasks[i].countData||{}; c.squeeze=parseInt(document.getElementById("squeeze"+i).value)||0; c.late=parseInt(document.getElementById("late"+i).value)||0; c.metal=parseInt(document.getElementById("metal"+i).value)||0; c.other=parseInt(document.getElementById("other"+i).value)||0; tasks[i].countData=c; draw(); }
function updatePerson(i,pi){ tasks[i].people[pi].count=parseInt(document.getElementById(`person${i}_${pi}`).value)||0; draw(); }
function removePerson(i,pi){ tasks[i].people.splice(pi,1); draw(); }
function addPerson(i){ let name=document.getElementById(`newPersonName${i}`).value; let c=parseInt(document.getElementById(`newPersonCount${i}`).value)||0; if(!name) return; tasks[i].people.push({name:name,count:c}); document.getElementById(`newPersonName${i}`).value=""; document.getElementById(`newPersonCount${i}`).value=""; draw();}
function addTask(){ let name=document.getElementById("newName").value; let c=parseInt(document.getElementById("newCount").value)||0; let t=parseInt(document.getElementById("newTotal").value)||10; let color=document.getElementById("newColor").value||"#4CAF50"; if(!name) return; let newTask={name:name,count:c,color:color}; if(name==="Complete sessions") newTask.total=t; tasks.push(newTask); document.getElementById("newName").value=""; document.getElementById("newCount").value=""; document.getElementById("newTotal").value=""; document.getElementById("newColor").value="#4CAF50"; draw();}
draw();
</script>

</body>
</html>
