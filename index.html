<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M-PATH Study Dashboard</title>

<style>

body{
font-family: Arial;
background:white;
max-width:800px;
margin:auto;
padding:40px;
}

h1{
margin-bottom:30px;
text-align:center;
font-weight:600;
}

.card{
background:#f5f7fb;
padding:20px;
margin-bottom:18px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.bar-bg{
width:100%;
background:#eee;
border-radius:8px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:28px;
color:white;
text-align:center;
line-height:28px;
transition:width 0.5s ease;
}

button{
padding:8px 14px;
margin-top:10px;
margin-right:6px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4CAF50;
color:white;
}

.delete{
background:#e74c3c;
}

input{
padding:6px;
margin-right:6px;
}

.editor{
margin-top:10px;
}

</style>
</head>

<body>

<h1>M-PATH Study Dashboard</h1>
<img src="M-PATH-logo.png" alt="Study Logo" style="display:block; margin:20px auto; max-width:300px;">

<div id="dashboard"></div>

<h3>Add Task</h3>

<input id="newName" placeholder="Task name">
<input id="newCount" type="number" placeholder="Count" min="0">
<input id="newTotal" type="number" placeholder="Total" min="1">
<input id="newColor" type="color" value="#4CAF50" title="Pick a color">

<button onclick="addTask()">Add</button>

<script>

let tasks=[
{name:"Sessions completed",count:43,total:60, color:"#0076b3ff"},
{name:"Complete sessions",count:30,total:60, color:"#e69138ff"}
]

if(localStorage.getItem("progressTasks")){
tasks=JSON.parse(localStorage.getItem("progressTasks"))
}

function draw(){

let html=""

tasks.forEach((t,i)=>{

if(i === 0){
  html += `
    <div class="card">
      <b>${t.name}</b>
      <div style="font-size:24px; font-weight:bold; margin-top:8px; color:${t.color}">
        ${t.count}
      </div>
      <div class="editor">
        Count: <input type="number" min="0" value="${t.count}" id="count${i}">
        <button onclick="update(${i})">Update</button>
        <button class="delete" onclick="removeTask(${i})">Delete</button>
      </div>
    </div>
  `;
} else {
  // existing bar code for other tasks
}

html+=`
<div class="card">

<b>${t.name}</b>

<div class="bar" style="width:${(t.count/t.total)*100}%;background:${t.color}">
  ${t.count} / ${t.total}
</div>

<div class="editor">
Count:
<input type="number" min="0" value="${t.count}" id="count${i}">
<button onclick="update(${i})">Update</button>
<button class="delete" onclick="removeTask(${i})">Delete</button>
</div>

</div>
`

})

document.getElementById("dashboard").innerHTML=html

}

function update(i){

tasks[i].count = document.getElementById("count"+i).value
tasks[i].total = document.getElementById("total"+i).value

save()

}

function removeTask(i){

tasks.splice(i,1)

save()

}

function addTask(){
  let name = document.getElementById("newName").value
  let count = parseInt(document.getElementById("newCount").value) || 0
  let total = parseInt(document.getElementById("newTotal").value) || 10
  let color = document.getElementById("newColor").value || "#4CAF50"
  
  if(!name) return

  tasks.push({name:name, count:count, total:total, color:color})

  document.getElementById("newName").value=""
  document.getElementById("newCount").value=""
  document.getElementById("newTotal").value=""
  document.getElementById("newColor").value="#4CAF50"

  save()
}

function save(){

localStorage.setItem("progressTasks",JSON.stringify(tasks))

draw()

}

draw()

</script>

</body>
</html>
